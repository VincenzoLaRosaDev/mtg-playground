name: Weekly EDHREC sync

# TEMP: scheduled + manual runs disabled until GitHub secrets are configured.
# Re-enable: set SYNC_JOBS_ENABLED to "true" and uncomment `schedule` below.
env:
  SYNC_JOBS_ENABLED: "false"

on:
  # schedule:
  #   # Sundays 04:00 UTC
  #   - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  sync-edhrec:
    if: env.SYNC_JOBS_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Sync EDHREC commanders (HOT tier)
        run: npm run sync:edhrec-commanders
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync EDHREC cards (HOT tier)
        run: npm run sync:edhrec-cards
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync EDHREC top lists (browse index)
        run: npm run sync:edhrec-top-lists
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
