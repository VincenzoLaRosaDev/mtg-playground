name: EDHREC commander catalog sync

# TEMP: scheduled + manual runs disabled until GitHub secrets are configured.
# Re-enable: set SYNC_JOBS_ENABLED to "true" and uncomment `schedule` below.
env:
  SYNC_JOBS_ENABLED: "false"

on:
  # schedule:
  #   # First Sunday of month 05:00 UTC (after weekly HOT sync)
  #   - cron: "0 5 1-7 * 0"
  workflow_dispatch:
    inputs:
      batch_size:
        description: Slugs per run
        required: false
        default: "500"
      offset:
        description: Offset into missing-slug list
        required: false
        default: "0"

jobs:
  sync-edhrec-catalog:
    if: env.SYNC_JOBS_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Sync EDHREC commander catalog (COLD tier)
        run: npm run sync:edhrec-commanders-catalog -- --batch-size=${{ inputs.batch_size || '500' }} --offset=${{ inputs.offset || '0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
